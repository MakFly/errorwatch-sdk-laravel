name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*', '12.*']
        exclude:
          - php: '8.1'
            laravel: '11.*'
          - php: '8.1'
            laravel: '12.*'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, openssl, curl
          coverage: none

      - name: Resolve Testbench version
        id: testbench
        run: |
          case "${{ matrix.laravel }}" in
            10.*) echo "version=^8.0" >> $GITHUB_OUTPUT ;;
            11.*) echo "version=^9.0" >> $GITHUB_OUTPUT ;;
            12.*) echo "version=^10.0" >> $GITHUB_OUTPUT ;;
          esac

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" \
                           "illuminate/http:${{ matrix.laravel }}" \
                           "illuminate/database:${{ matrix.laravel }}" \
                           "illuminate/queue:${{ matrix.laravel }}" \
                           "illuminate/console:${{ matrix.laravel }}" \
                           "illuminate/auth:${{ matrix.laravel }}" \
                           --no-update
          composer require "orchestra/testbench:${{ steps.testbench.outputs.version }}" --dev --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Security audit
        run: composer audit

      - name: Run tests
        run: composer test
